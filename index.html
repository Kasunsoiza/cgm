<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>CrownGate Migration – Coming Soon</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --navy: #0d1b3e;
        --navy-mid: #162447;
        --gold: #c9a84c;
        --gold-light: #e8c97a;
        --cream: #f5f0e8;
        --white: #ffffff;
        --text-muted: rgba(255,255,255,0.55);
      }

      html { font-size: 62.5%; }

      body {
        font-family: 'Montserrat', sans-serif;
        background-color: var(--navy);
        color: var(--white);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
        position: relative;
      }

      /* ── Background ── */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 60% at 20% 10%, rgba(201,168,76,0.08) 0%, transparent 60%),
          radial-gradient(ellipse 60% 80% at 80% 80%, rgba(22,36,71,0.9) 0%, transparent 70%),
          linear-gradient(160deg, #0d1b3e 0%, #162447 50%, #0a1428 100%);
        z-index: 0;
      }

      /* Subtle grid overlay */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
        background-size: 60px 60px;
        z-index: 0;
      }

      .wrapper {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 4rem 2rem 8rem;
      }

      /* ── Crown / Logo Mark ── */
      .logo-mark {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.2rem;
        margin-bottom: 3.5rem;
        animation: fadeDown 1s ease both;
      }

      .crown-icon {
        width: 56px;
        height: 56px;
        opacity: 0.95;
      }

      .logo-wordmark {
        display: flex;
        align-items: center;
        gap: 0.8rem;
      }

      .logo-wordmark span {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.6rem;
        font-weight: 600;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--gold);
      }

      .logo-wordmark .divider {
        width: 1px;
        height: 18px;
        background: var(--gold);
        opacity: 0.4;
      }

      /* ── Divider line ── */
      .gold-line {
        width: 80px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
        margin: 0 auto 3.5rem;
        animation: fadeIn 1.2s ease 0.3s both;
      }

      /* ── Main Title ── */
      .main-title {
        text-align: center;
        margin-bottom: 1.6rem;
        animation: fadeDown 1s ease 0.15s both;
      }

      .main-title h1 {
        font-family: 'Cormorant Garamond', serif;
        font-size: clamp(4.8rem, 9vw, 10rem);
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.04em;
        color: var(--white);
        text-transform: uppercase;
      }

      .main-title h1 .highlight {
        color: var(--gold);
      }

      .main-title h2 {
        font-family: 'Montserrat', sans-serif;
        font-size: clamp(1.2rem, 2.5vw, 1.8rem);
        font-weight: 300;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-top: 1.2rem;
      }

      /* ── SVG Illustration ── */
      .illustration-wrap {
        width: 100%;
        max-width: 680px;
        margin: 3rem auto 0;
        animation: fadeUp 1.2s ease 0.4s both;
        opacity: 0.9;
      }

      .illustration-wrap svg {
        width: 100%;
        height: auto;
      }

      /* ── Coming Soon Tagline ── */
      .tagline {
        text-align: center;
        margin-top: 3.5rem;
        animation: fadeUp 1s ease 0.6s both;
      }

      .tagline p {
        font-size: 1.3rem;
        font-weight: 300;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .tagline .email-link {
        display: inline-block;
        margin-top: 1.8rem;
        font-size: 1.3rem;
        letter-spacing: 0.1em;
        color: var(--gold-light);
        text-decoration: none;
        border-bottom: 1px solid rgba(201,168,76,0.3);
        padding-bottom: 2px;
        transition: color 0.3s, border-color 0.3s;
      }

      .tagline .email-link:hover {
        color: var(--white);
        border-color: var(--white);
      }

      /* ── Footer ── */
      footer {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 1.8rem 2rem;
        border-top: 1px solid rgba(201,168,76,0.12);
        background: rgba(13,27,62,0.6);
        backdrop-filter: blur(8px);
      }

      footer span {
        font-size: 1.1rem;
        letter-spacing: 0.15em;
        color: rgba(201,168,76,0.6);
        text-transform: lowercase;
      }

      /* ── Animations ── */
      @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-22px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(22px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      /* SVG Element Animations (preserved from template) */
      #clock {
        animation: clockHand 5s infinite linear;
        transform-box: fill-box;
        transform-origin: bottom;
      }

      #leftTree, #righTree {
        animation: tree 2s ease-in-out infinite alternate;
        transform-box: fill-box;
        transform-origin: bottom;
      }

      #man {
        animation: manBody 1s ease-in-out infinite alternate;
        transform-box: fill-box;
        transform-origin: bottom;
      }

      #pc-circle {
        animation: change-light 4s linear infinite alternate;
      }

      @keyframes clockHand {
        from { transform: rotateZ(0deg); }
        to   { transform: rotateZ(-360deg); }
      }

      @keyframes manBody {
        from { transform: rotateX(0deg); }
        to   { transform: rotateX(10deg); }
      }

      @keyframes tree {
        from { transform: rotateZ(10deg); }
        to   { transform: rotateZ(-20deg); }
      }

      @keyframes change-light {
        0%   { fill: #c9a84c; }
        25%  { fill: #e8c97a; }
        75%  { fill: #6C63FF; }
        100% { fill: #c9a84c; }
      }

      /* Floating dots decoration */
      .dot {
        position: fixed;
        border-radius: 50%;
        background: var(--gold);
        opacity: 0.12;
        pointer-events: none;
        z-index: 0;
      }
      .dot-1 { width: 320px; height: 320px; top: -80px; right: -80px; }
      .dot-2 { width: 200px; height: 200px; bottom: 60px; left: -60px; opacity: 0.07; }
    </style>
  </head>
